<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GGT Dialer</title>
  <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.10.0/dist/twilio.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    .from-badge {
      background: #f0faf5;
      border: 1px solid #b6e8d0;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .from-badge .dot { width: 8px; height: 8px; background: #1D9E75; border-radius: 50%; flex-shrink: 0; }
    .from-badge span { font-size: 13px; color: #1D9E75; font-weight: 500; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; color: #1a1a2e; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: #1D9E75; }
    .btn-call {
      width: 100%; padding: 13px; background: #1D9E75; color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-call:hover { background: #178a63; }
    .btn-call:active { transform: scale(0.98); }
    .btn-call:disabled { background: #b0c9bf; cursor: not-allowed; transform: none; }
    .btn-transfer {
      width: 100%; padding: 13px; background: #1a6fc4; color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 10px; transition: background 0.2s;
      display: none; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-transfer:hover { background: #155ba0; }
    .btn-transfer:disabled { background: #9ab8d8; cursor: not-allowed; }
    .btn-hangup {
      width: 100%; padding: 13px; background: #fff; color: #e03e3e;
      border: 1.5px solid #e03e3e; border-radius: 10px; font-size: 16px;
      font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; display: none;
    }
    .btn-hangup:hover { background: #fff0f0; }
    .status-box {
      margin-top: 20px; background: #f8f9fb; border-radius: 10px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
    .status-indicator.ready { background: #1D9E75; }
    .status-indicator.calling { background: #f5a623; animation: pulse 1s infinite; }
    .status-indicator.connected { background: #1D9E75; animation: pulse 1s infinite; }
    .status-indicator.transferring { background: #1a6fc4; animation: pulse 1s infinite; }
    .status-indicator.error { background: #e03e3e; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 14px; color: #444; font-weight: 500; }
    .timer { margin-left: auto; font-size: 14px; font-weight: 600; color: #1D9E75; display: none; font-variant-numeric: tabular-nums; }
    .mute-row { display: none; margin-top: 10px; gap: 10px; }
    .btn-mute {
      flex: 1; padding: 10px; border: 1.5px solid #e0e0e0; border-radius: 8px;
      background: white; font-size: 13px; font-weight: 500; cursor: pointer; color: #555; transition: background 0.2s;
    }
    .btn-mute:hover { background: #f4f4f4; }
    .btn-mute.active { background: #fff3e0; border-color: #f5a623; color: #c77c00; }
    .transfer-note {
      display: none; margin-top: 10px; background: #eef4ff;
      border: 1px solid #b8d0f5; border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #1a6fc4; text-align: center;
    }
    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #aaa; }
    .loading-overlay { text-align: center; padding: 20px 0; color: #888; font-size: 14px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Global Gate Tax Relief</h1>
    <p>Agent Dialer</p>
  </div>
  <div class="from-badge">
    <div class="dot"></div>
    <span>Calling from: +1 (833) 389-0237</span>
  </div>
  <div id="loading" class="loading-overlay">Connecting to dialer...</div>
  <div id="dialer" style="display:none;">
    <div class="field">
      <label>Lead Phone Number</label>
      <input type="tel" id="phoneInput" placeholder="+1 (555) 000-0000" />
    </div>
    <div class="field">
      <label>Lead Name (optional)</label>
      <input type="text" id="nameInput" placeholder="John Smith" />
    </div>
    <button class="btn-call" id="btnCall" onclick="makeCall()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" fill="white"/></svg>
      Call Lead
    </button>
    <button class="btn-transfer" id="btnTransfer" onclick="transferCall()">
      ➜ Transfer to Senior Rep
    </button>
    <button class="btn-hangup" id="btnHangup" onclick="hangUp()">End Call</button>
    <div class="mute-row" id="muteRow">
      <button class="btn-mute" id="btnMute" onclick="toggleMute()">Mute</button>
    </div>
    <div class="transfer-note" id="transferNote">
      Lead transferred to senior rep. You can hang up now.
    </div>
    <div class="status-box">
      <div class="status-indicator ready" id="statusDot"></div>
      <span class="status-text" id="statusText">Ready</span>
      <span class="timer" id="timer">0:00</span>
    </div>
  </div>
  <div class="footer">Powered by Twilio &bull; Global Gate Tax Relief</div>
</div>

<script>
  const TOKEN_URL = 'https://githubdialer-1825.twil.io/token';
  const TRANSFER_URL = 'https://githubdialer-1825.twil.io/transfer';
  const CALLER_ID = '+18333890237';
  const TRANSFER_TO = '+19493873298';

  let device, call, callSid, muted = false, timerInterval, seconds = 0;

  async function initDevice() {
    try {
      const res = await fetch(TOKEN_URL);
      const data = await res.json();
      device = new Twilio.Device(data.token, { codecPreferences: ['opus', 'pcmu'] });
      device.on('ready', () => setStatus('ready', 'Ready'));
      device.on('error', (err) => setStatus('error', 'Error: ' + err.message));
      device.on('disconnect', () => onDisconnect());
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dialer').style.display = 'block';
    } catch (e) {
      document.getElementById('loading').textContent = 'Failed to connect. Please refresh.';
    }
  }

  function onCallConnected(c) {
    callSid = (c && c.parameters && c.parameters.CallSid) ? c.parameters.CallSid : (c && c.callSid ? c.callSid : '');
    setStatus('connected', 'Connected');
    document.getElementById('btnCall').style.display = 'none';
    document.getElementById('btnTransfer').style.display = 'flex';
    document.getElementById('btnHangup').style.display = 'block';
    document.getElementById('muteRow').style.display = 'flex';
    document.getElementById('timer').style.display = 'block';
    startTimer();
  }

  function makeCall() {
    let phone = document.getElementById('phoneInput').value.trim();
    if (!phone) { alert('Please enter a phone number.'); return; }
    phone = phone.replace(/\D/g, '');
    if (phone.length === 10) phone = '1' + phone;
    phone = '+' + phone;

    call = device.connect({ params: { To: phone, CallerId: CALLER_ID } });
    call.on('ringing', () => setStatus('calling', 'Ringing...'));
    call.on('accept', (c) => onCallConnected(c));
    call.on('connect', (c) => onCallConnected(c));
    call.on('disconnect', () => onDisconnect());
    call.on('error', () => setStatus('error', 'Call error'));
    setStatus('calling', 'Calling...');
    document.getElementById('btnCall').disabled = true;
  }

  async function transferCall() {
    const btn = document.getElementById('btnTransfer');
    btn.disabled = true;
    btn.textContent = 'Transferring...';
    setStatus('transferring', 'Transferring...');
    try {
      await fetch(TRANSFER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ callSid, transferTo: TRANSFER_TO })
      });
      document.getElementById('transferNote').style.display = 'block';
      document.getElementById('muteRow').style.display = 'none';
      setStatus('transferring', 'Transferred — hang up when ready');
    } catch (e) {
      setStatus('error', 'Transfer failed — try again');
      btn.disabled = false;
      btn.textContent = '➜ Transfer to Senior Rep';
    }
  }

  function hangUp() { if (call) call.disconnect(); }

  function onDisconnect() {
    setStatus('ready', 'Call ended');
    document.getElementById('btnCall').style.display = 'flex';
    document.getElementById('btnCall').disabled = false;
    document.getElementById('btnTransfer').style.display = 'none';
    document.getElementById('btnTransfer').disabled = false;
    document.getElementById('btnTransfer').textContent = '➜ Transfer to Senior Rep';
    document.getElementById('btnHangup').style.display = 'none';
    document.getElementById('muteRow').style.display = 'none';
    document.getElementById('timer').style.display = 'none';
    document.getElementById('transferNote').style.display = 'none';
    stopTimer();
    muted = false;
    document.getElementById('btnMute').classList.remove('active');
    document.getElementById('btnMute').textContent = 'Mute';
    setTimeout(() => setStatus('ready', 'Ready'), 3000);
  }

  function toggleMute() {
    muted = !muted;
    if (call) call.mute(muted);
    const btn = document.getElementById('btnMute');
    btn.classList.toggle('active', muted);
    btn.textContent = muted ? 'Unmute' : 'Mute';
  }

  function setStatus(type, text) {
    document.getElementById('statusDot').className = 'status-indicator ' + type;
    document.getElementById('statusText').textContent = text;
  }

  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = String(seconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = m + ':' + s;
    }, 1000);
  }

  function stopTimer() { clearInterval(timerInterval); }

  initDevice();
</script>
</body>
</html>
